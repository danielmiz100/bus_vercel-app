<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bus Finder</title>
  <style>
    body { font-family: -apple-system; text-align: center; padding: 20px; }
    button {
      font-size: 18px;
      padding: 15px;
      margin: 10px;
      width: 90%;
    }
    .bus {
      margin-top: 15px;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

<h2>Bus Finder</h2>

<button onclick="start()">Lougheed</button>
<button onclick="start()">Burquitlam</button>
<button onclick="start()">Regent (EB)</button>

<div id="results">Select a destination</div>

<script>
let interval = null;

function start() {
  document.getElementById("results").innerHTML = "Loading...";

  load();

  if (interval) clearInterval(interval);
  interval = setInterval(load, 30000);
}

function load() {
  fetch(`/api/bus`)
    .then(r => r.json())
    .then(data => {

      console.log("API data:", data);

      document.getElementById("results").innerHTML =
        data.map(b => `
          <div class="bus">
            🚌 ${b.route} → ${b.destination} (${b.direction})<br>
            <strong>${b.minutes} min</strong>
          </div>
        `).join("") || "No buses.";
    })
    .catch(err => {
      console.error(err);
      document.getElementById("results").innerHTML = "Error loading buses.";
    });
}
</script>

</body>
</html>
