<script>
let interval = null;

function start(dest) {
  document.getElementById("results").innerHTML = "Loading...";

  load();

  if (interval) clearInterval(interval);
  interval = setInterval(load, 30000);
}

function load() {
  fetch(`/api/bus`)
    .then(r => r.json())
    .then(data => {

      console.log("API data:", data);

      document.getElementById("results").innerHTML =
        data.map(b => `
          <div class="bus">
            🚌 ${b.route} → ${b.destination} (${b.direction})<br>
            <strong>${b.minutes} min</strong>
          </div>
        `).join("") || "No buses.";
    })
    .catch(() => {
      document.getElementById("results").innerHTML = "Error loading buses.";
    });
}
</script>
