<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bus Finder</title>
  <style>
    body { font-family: -apple-system; text-align: center; padding: 20px; }
    button {
      font-size: 18px;
      padding: 15px;
      margin: 10px;
      width: 90%;
    }
    .bus {
      margin-top: 15px;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

<h2>Bus Finder</h2>

<button onclick="start('lougheed')">Lougheed</button>
<button onclick="start('burquitlam')">Burquitlam</button>
<button onclick="start('regent')">Regent (EB)</button>

<div id="results">Select a destination</div>

<script>
const DEST_FILTERS = {
  lougheed: { keywords: ["lougheed"], directions: ["W"] },
  burquitlam: { keywords: ["burquitlam"], directions: ["W","N"] },
  regent: { keywords: [], directions: ["E"] }
};

const FIXED_STOPS = {
  regent: "52813"
};

function start(dest) {
  document.getElementById("results").innerHTML = "Loading...";

  if (FIXED_STOPS[dest]) {
    load(FIXED_STOPS[dest], dest);
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    // For simplicity, use known stops
    const stop = "52035"; // fallback (Burquitlam area)
    load(stop, dest);
  });
}

function load(stopId, dest) {
  fetch(`/api/bus?stop=${stopId}`)
    .then(r => r.json())
    .then(data => {
      const filter = DEST_FILTERS[dest];

      const results = data.filter(b => {
        const d = b.destination.toLowerCase();

        const keywordMatch = filter.keywords.length === 0 ||
          filter.keywords.some(k => d.includes(k));

        const directionMatch = filter.directions.includes(b.direction);

        return keywordMatch && directionMatch;
      });

      results.sort((a,b)=>a.minutes-b.minutes);

      document.getElementById("results").innerHTML =
        results.map(b => `
          <div class="bus">
            ?? ${b.route} ? ${b.destination}<br>
            <strong>${b.minutes} min</strong>
          </div>
        `).join("") || "No buses.";
    })
    .catch(() => {
      document.getElementById("results").innerHTML = "Error loading buses.";
    });
}
</script>

</body>
</html>
